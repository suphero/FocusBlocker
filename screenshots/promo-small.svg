<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280" width="440" height="280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#42A5F5"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>
  <circle cx="0" cy="280" r="150" fill="white" opacity="0.05"/>
  <circle cx="440" cy="0" r="120" fill="white" opacity="0.05"/>

  <!-- Left: Brand -->
  <!-- Shield icon -->
  <g transform="translate(30, 60)">
    <path d="M30 0 L6 10.5 V28.5 C6 43.5 30 54 30 54 S54 43.5 54 28.5 V10.5 Z" fill="white" opacity="0.2"/>
    <path d="M30 4 L10 13 V28.5 C10 41 30 50 30 50 S50 41 50 28.5 V13 Z" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <!-- Checkmark inside shield -->
    <polyline points="20,28 27,35 42,18" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  </g>

  <text x="30" y="150" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="white">Focus Blocker</text>
  <text x="30" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="white" opacity="0.8">Block distractions.</text>
  <text x="30" y="196" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="white" opacity="0.8">Stay focused.</text>

  <!-- Right: Mini popup mockup -->
  <g transform="translate(250, 30)" filter="url(#shadow)">
    <rect width="165" height="220" rx="8" fill="white"/>

    <text x="12" y="22" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a">Focus Blocker</text>

    <!-- Toggle -->
    <rect x="12" y="30" width="28" height="15" rx="7.5" fill="#2196F3"/>
    <circle cx="33" cy="37.5" r="5.5" fill="white"/>
    <text x="46" y="41" font-family="Arial, Helvetica, sans-serif" font-size="8" font-weight="500" fill="#2196F3">ON</text>

    <!-- Chips -->
    <rect x="12" y="54" width="62" height="16" rx="8" fill="#e8f0fe"/>
    <text x="18" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a73e8">facebook.com</text>
    <rect x="80" y="54" width="42" height="16" rx="8" fill="#e8f0fe"/>
    <text x="86" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a73e8">x.com</text>
    <rect x="128" y="54" width="26" height="16" rx="8" fill="#e8f0fe"/>
    <text x="134" y="65" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a73e8">...</text>

    <rect x="12" y="76" width="66" height="16" rx="8" fill="#e8f0fe"/>
    <text x="18" y="87" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a73e8">instagram.com</text>
    <rect x="84" y="76" width="60" height="16" rx="8" fill="#e8f0fe"/>
    <text x="90" y="87" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#1a73e8">youtube.com</text>

    <!-- Timer mini preview -->
    <line x1="12" y1="102" x2="153" y2="102" stroke="#f0f0f0" stroke-width="0.5"/>
    <circle cx="82" cy="145" r="30" fill="none" stroke="#e0e0e0" stroke-width="3"/>
    <circle cx="82" cy="145" r="30" fill="none" stroke="#00897B" stroke-width="3"
            stroke-dasharray="188" stroke-dashoffset="47" stroke-linecap="round"
            transform="rotate(-90 82 145)"/>
    <text x="82" y="148" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">25:00</text>
    <text x="82" y="162" font-family="Arial, Helvetica, sans-serif" font-size="7" fill="#00897B" text-anchor="middle">Focus</text>

    <!-- Mini tab bar -->
    <line x1="0" y1="200" x2="165" y2="200" stroke="#e0e0e0" stroke-width="0.5"/>
    <rect x="5" y="210" width="3" height="3" rx="1" fill="#2196F3"/>
    <rect x="32" y="210" width="3" height="3" rx="1" fill="#ccc"/>
    <rect x="59" y="210" width="3" height="3" rx="1" fill="#ccc"/>
    <rect x="86" y="210" width="3" height="3" rx="1" fill="#ccc"/>
    <rect x="113" y="210" width="3" height="3" rx="1" fill="#ccc"/>
    <rect x="140" y="210" width="3" height="3" rx="1" fill="#ccc"/>
  </g>
</svg>
