    <text x="36" y="285" font-family="Arial, Helvetica, sans-serif" font-size="28">🎬</text>
    <text x="76" y="280" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Entertainment</text>
    <text x="76" y="302" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#888">5 sites</text>
    <text x="390" y="285" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ccc">▾</text>

    <rect x="20" y="340" width="400" height="80" rx="10" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="36" y="375" font-family="Arial, Helvetica, sans-serif" font-size="28">🛒</text>
    <text x="76" y="370" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Shopping</text>
    <text x="76" y="392" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#888">5 sites</text>
    <text x="390" y="375" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ccc">▾</text>

    <rect x="20" y="430" width="400" height="80" rx="10" fill="#f8f9fa" stroke="#e0e0e0" stroke-width="1"/>
    <text x="36" y="465" font-family="Arial, Helvetica, sans-serif" font-size="28">🎮</text>
    <text x="76" y="460" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">Gaming</text>
    <text x="76" y="482" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#888">5 sites</text>
    <text x="390" y="465" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ccc">▾</text>

    <rect x="20" y="525" width="400" height="40" rx="8" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="220" y="551" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#E65100" text-anchor="middle">+ Custom Category</text>

    <line x1="0" y1="580" x2="440" y2="580" stroke="#e0e0e0" stroke-width="1"/>
    <text x="24" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">🛡️</text>
    <text x="97" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">⏱️</text>
    <text x="170" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📅</text>
    <text x="243" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📁</text>
    <rect x="235" y="622" width="38" height="3" rx="1.5" fill="#E65100"/>
    <text x="316" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📊</text>
    <text x="389" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">⚙️</text>
