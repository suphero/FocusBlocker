<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E65100"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="1280" cy="0" r="400" fill="white" opacity="0.04"/>
  <circle cx="0" cy="800" r="350" fill="white" opacity="0.04"/>

  <!-- Left: Category icons showcase -->
  <text x="80" y="100" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="bold" fill="white">Categories</text>

  <!-- Category cards -->
  <g transform="translate(80, 140)">
    <rect width="420" height="100" rx="16" fill="white" opacity="0.15"/>
    <text x="30" y="58" font-family="Arial, Helvetica, sans-serif" font-size="40">👥</text>
    <text x="90" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="white">Social Media</text>
    <text x="90" y="78" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" opacity="0.7">facebook, x, instagram, tiktok, reddit</text>
  </g>

  <g transform="translate(80, 260)">
    <rect width="420" height="100" rx="16" fill="white" opacity="0.15"/>
    <text x="30" y="58" font-family="Arial, Helvetica, sans-serif" font-size="40">📰</text>
    <text x="90" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="white">News</text>
    <text x="90" y="78" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" opacity="0.7">cnn, bbc, nytimes, huffpost</text>
  </g>

  <g transform="translate(80, 380)">
    <rect width="420" height="100" rx="16" fill="white" opacity="0.15"/>
    <text x="30" y="58" font-family="Arial, Helvetica, sans-serif" font-size="40">🎬</text>
    <text x="90" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="white">Entertainment</text>
    <text x="90" y="78" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" opacity="0.7">youtube, netflix, twitch, hulu</text>
  </g>

  <g transform="translate(80, 500)">
    <rect width="420" height="100" rx="16" fill="white" opacity="0.15"/>
    <text x="30" y="58" font-family="Arial, Helvetica, sans-serif" font-size="40">🛒</text>
    <text x="90" y="50" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="600" fill="white">Shopping</text>
    <text x="90" y="78" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" opacity="0.7">amazon, ebay, etsy, aliexpress</text>
  </g>

