    <text x="76" y="190" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" fill="#1a1a1a">News</text>
    <text x="76" y="212" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#888">5 sites</text>
    <text x="390" y="195" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#ccc">▾</text>

