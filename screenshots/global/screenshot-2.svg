<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="1280" cy="800" r="450" fill="white" opacity="0.04"/>
  <circle cx="0" cy="0" r="300" fill="white" opacity="0.04"/>

  <!-- Center: Large timer visual -->
  <g transform="translate(140, 140)">
    <!-- Large decorative timer ring -->
    <circle cx="250" cy="250" r="220" fill="white" opacity="0.08"/>
    <circle cx="250" cy="250" r="180" fill="white" opacity="0.06"/>
    <circle cx="250" cy="250" r="140" fill="white" opacity="0.1"/>
    <circle cx="250" cy="250" r="140" fill="none" stroke="white" stroke-width="6"
            stroke-dasharray="879" stroke-dashoffset="220" stroke-linecap="round"
            transform="rotate(-90 250 250)" opacity="0.8"/>
    <text x="250" y="240" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">25:00</text>
    <text x="250" y="285" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="white" opacity="0.8" text-anchor="middle">Pomodoro</text>

    <!-- Session dots -->
    <circle cx="205" cy="330" r="10" fill="white" opacity="0.9"/>
    <circle cx="235" cy="330" r="10" fill="white" opacity="0.3"/>
    <circle cx="265" cy="330" r="10" fill="white" opacity="0.3"/>
    <circle cx="295" cy="330" r="10" fill="white" opacity="0.3"/>
  </g>

  <!-- Right: Timer popup mockup -->
  <g transform="translate(700, 80)" filter="url(#shadow)">
    <rect width="440" height="640" rx="16" fill="white"/>

    <text x="28" y="46" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a">Focus Blocker</text>

    <circle cx="220" cy="250" r="120" fill="none" stroke="#e0e0e0" stroke-width="9"/>
    <circle cx="220" cy="250" r="120" fill="none" stroke="#00897B" stroke-width="9"
            stroke-dasharray="754" stroke-dashoffset="189" stroke-linecap="round"
            transform="rotate(-90 220 250)"/>

    <text x="220" y="240" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="bold" fill="#1a1a1a" text-anchor="middle">18:32</text>
    <text x="220" y="278" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#00897B" text-anchor="middle" font-weight="500">Focus</text>

    <circle cx="175" cy="310" r="7" fill="#00897B"/>
    <circle cx="198" cy="310" r="7" fill="#e0e0e0"/>
    <circle cx="221" cy="310" r="7" fill="#e0e0e0"/>
    <circle cx="244" cy="310" r="7" fill="#e0e0e0"/>

    <rect x="50" y="380" width="150" height="42" rx="8" fill="#e0e0e0"/>
    <text x="125" y="406" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="#666" text-anchor="middle">Skip</text>
    <rect x="220" y="380" width="150" height="42" rx="8" fill="#ef5350"/>
    <text x="295" y="406" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="500" fill="white" text-anchor="middle">Reset</text>

    <line x1="0" y1="580" x2="440" y2="580" stroke="#e0e0e0" stroke-width="1"/>
    <text x="24" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">🛡️</text>
    <text x="97" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">⏱️</text>
    <rect x="89" y="622" width="38" height="3" rx="1.5" fill="#00897B"/>
    <text x="170" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📅</text>
    <text x="243" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📁</text>
    <text x="316" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">📊</text>
    <text x="389" y="614" font-family="Arial, Helvetica, sans-serif" font-size="18">⚙️</text>
  </g>
</svg>
