<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <!-- Dark background -->
  <rect width="1280" height="800" fill="#121212"/>
  <rect x="80" y="60" width="1120" height="680" rx="12" fill="#1e1e1e" filter="url(#shadow)"/>

  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Browser chrome bar (dark) -->
  <rect x="80" y="60" width="1120" height="48" rx="12" fill="#2d2d2d"/>
  <rect x="80" y="96" width="1120" height="12" fill="#2d2d2d"/>
  <circle cx="110" cy="84" r="7" fill="#FF5F56"/>
  <circle cx="132" cy="84" r="7" fill="#FFBD2E"/>
  <circle cx="154" cy="84" r="7" fill="#27C93F"/>
  <rect x="200" y="72" width="780" height="26" rx="13" fill="#3a3a3a"/>
  <text x="590" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#9e9e9e" text-anchor="middle">chrome-extension://focusblocker/popup.html</text>

  <!-- Popup container (dark) -->
  <rect x="390" y="140" width="500" height="580" rx="8" fill="#1e1e1e" stroke="#3a3a3a" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="185" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0">Focus Blocker</text>

  <!-- Toggle row -->
  <rect x="430" y="210" width="72" height="40" rx="20" fill="#64b5f6"/>
  <circle cx="482" cy="230" r="15" fill="white"/>
  <text x="520" y="237" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="500" fill="#64b5f6">Focus Mode: ON</text>

  <!-- Section label -->
  <text x="430" y="290" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#a0a0a0" letter-spacing="1">BLOCKED WEBSITES</text>

  <!-- Dark chips -->
  <rect x="430" y="310" width="175" height="38" rx="19" fill="#263238"/>
  <text x="445" y="335" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#90caf9">facebook.com</text>
  <text x="592" y="336" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e">×</text>

  <rect x="615" y="310" width="110" height="38" rx="19" fill="#263238"/>
  <text x="630" y="335" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#90caf9">x.com</text>
  <text x="712" y="336" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e">×</text>

  <rect x="430" y="358" width="185" height="38" rx="19" fill="#263238"/>
  <text x="445" y="383" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#90caf9">instagram.com</text>
  <text x="602" y="384" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e">×</text>

  <rect x="625" y="358" width="170" height="38" rx="19" fill="#263238"/>
  <text x="640" y="383" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#90caf9">youtube.com</text>
  <text x="782" y="384" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e">×</text>

  <rect x="430" y="406" width="180" height="38" rx="19" fill="#263238"/>
  <text x="445" y="431" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#90caf9">whatsapp.com</text>
  <text x="597" y="432" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e">×</text>

  <!-- Add site input (dark) -->
  <rect x="430" y="466" width="340" height="42" rx="8" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
  <text x="445" y="493" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#666">example.com</text>
  <rect x="780" y="466" width="80" height="42" rx="8" fill="#64b5f6"/>
  <text x="820" y="493" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="white" text-anchor="middle">Add</text>

  <!-- Save button (dark) -->
  <rect x="430" y="536" width="430" height="48" rx="8" fill="#64b5f6"/>
  <text x="645" y="567" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="500" fill="white" text-anchor="middle">Save</text>

  <!-- Caption -->
  <text x="640" y="770" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e" text-anchor="middle">Popup — Dark Mode</text>
</svg>
