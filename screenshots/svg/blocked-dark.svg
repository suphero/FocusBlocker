<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800">
  <!-- Dark background -->
  <rect width="1280" height="800" fill="#121212"/>
  <rect x="80" y="60" width="1120" height="680" rx="12" fill="#1e1e1e" filter="url(#shadow)"/>

  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Browser chrome (dark) -->
  <rect x="80" y="60" width="1120" height="48" rx="12" fill="#2d2d2d"/>
  <rect x="80" y="96" width="1120" height="12" fill="#2d2d2d"/>
  <circle cx="110" cy="84" r="7" fill="#FF5F56"/>
  <circle cx="132" cy="84" r="7" fill="#FFBD2E"/>
  <circle cx="154" cy="84" r="7" fill="#27C93F"/>
  <rect x="200" y="72" width="780" height="26" rx="13" fill="#3a3a3a"/>
  <text x="590" y="90" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#9e9e9e" text-anchor="middle">https://facebook.com</text>

  <!-- Page background (dark) -->
  <rect x="80" y="108" width="1120" height="632" fill="#121212"/>

  <!-- Blocked card (dark) -->
  <rect x="370" y="210" width="540" height="380" rx="16" fill="#1e1e1e" filter="url(#shadow)"/>

  <!-- Shield icon -->
  <g transform="translate(600, 260)">
    <path d="M40 0 L8 14 V38 C8 58 40 72 40 72 S72 58 72 38 V14 Z" fill="none" stroke="#ef5350" stroke-width="4"/>
    <line x1="24" y1="24" x2="56" y2="52" stroke="#ef5350" stroke-width="4" stroke-linecap="round"/>
    <line x1="56" y1="24" x2="24" y2="52" stroke="#ef5350" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <text x="640" y="380" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#e0e0e0" text-anchor="middle">This website has been blocked</text>

  <!-- Description -->
  <text x="640" y="420" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#9e9e9e" text-anchor="middle">Focus Blocker is keeping you on track.</text>
  <text x="640" y="445" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#9e9e9e" text-anchor="middle">This site is on your blocked list.</text>

  <!-- Back button (dark) -->
  <rect x="490" y="475" width="300" height="48" rx="8" fill="none" stroke="#64b5f6" stroke-width="2"/>
  <text x="640" y="505" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#64b5f6" text-anchor="middle">Go back to the original website</text>

  <!-- Caption -->
  <text x="640" y="770" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#9e9e9e" text-anchor="middle">Blocked Page — Dark Mode</text>
</svg>
