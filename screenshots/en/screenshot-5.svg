<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#E57373"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="640" cy="400" r="500" fill="white" opacity="0.03"/>

  <!-- Headline -->
  <text x="640" y="80" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">Stay On Track</text>
  <text x="640" y="120" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="white" opacity="0.8" text-anchor="middle">Blocked sites show a friendly reminder to stay focused</text>

  <!-- Browser frame -->
  <g transform="translate(190, 160)" filter="url(#shadow)">
    <rect width="900" height="550" rx="12" fill="white"/>

    <!-- Browser chrome -->
    <rect width="900" height="44" rx="12" fill="#f1f3f4"/>
    <rect y="32" width="900" height="12" fill="#f1f3f4"/>
    <circle cx="26" cy="22" r="6" fill="#FF5F56"/>
    <circle cx="46" cy="22" r="6" fill="#FFBD2E"/>
    <circle cx="66" cy="22" r="6" fill="#27C93F"/>
    <rect x="120" y="10" width="660" height="24" rx="12" fill="#e8eaed"/>
    <text x="450" y="28" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#5f6368" text-anchor="middle">https://facebook.com</text>

    <!-- Page background -->
    <rect y="44" width="900" height="506" fill="#f8f9fa"/>

    <!-- Blocked card -->
    <rect x="210" y="100" width="480" height="360" rx="16" fill="white" filter="url(#shadow)"/>

    <!-- Shield icon with X -->
    <g transform="translate(410, 130)">
      <path d="M40 0 L8 14 V38 C8 58 40 72 40 72 S72 58 72 38 V14 Z" fill="none" stroke="#d93025" stroke-width="4"/>
      <line x1="26" y1="26" x2="54" y2="50" stroke="#d93025" stroke-width="4" stroke-linecap="round"/>
      <line x1="54" y1="26" x2="26" y2="50" stroke="#d93025" stroke-width="4" stroke-linecap="round"/>
    </g>

    <!-- Blocked text -->
    <text x="450" y="250" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">This website has been blocked</text>
    <text x="450" y="290" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5f6368" text-anchor="middle">Focus Blocker is keeping you on track.</text>
    <text x="450" y="315" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#5f6368" text-anchor="middle">This site is on your blocked list.</text>

    <!-- Back button -->
    <rect x="300" y="345" width="300" height="44" rx="8" fill="none" stroke="#2196F3" stroke-width="2"/>
    <text x="450" y="373" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#2196F3" text-anchor="middle">Go back to the original website</text>
  </g>
</svg>
