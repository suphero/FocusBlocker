<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Split background -->
  <rect width="640" height="800" fill="#f0f4ff"/>
  <rect x="640" width="640" height="800" fill="#121212"/>

  <!-- Center headline -->
  <rect x="440" y="30" width="400" height="52" rx="26" fill="#2196F3"/>
  <text x="640" y="64" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Light &amp; Dark Mode</text>

  <!-- Left: Light mode popup -->
  <g transform="translate(80, 100)" filter="url(#shadow)">
    <rect width="420" height="600" rx="16" fill="white"/>

    <text x="28" y="46" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#1a1a1a">Focus Blocker</text>

    <rect x="28" y="64" width="58" height="30" rx="15" fill="#2196F3"/>
    <circle cx="73" cy="79" r="11" fill="white"/>
    <text x="98" y="85" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#2196F3">Focus Mode: ON</text>

    <text x="28" y="125" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#888" letter-spacing="1.5">BLOCKED WEBSITES</text>

    <rect x="28" y="140" width="135" height="30" rx="15" fill="#e8f0fe"/>
    <text x="42" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a73e8">facebook.com</text>
    <rect x="170" y="140" width="85" height="30" rx="15" fill="#e8f0fe"/>
    <text x="184" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a73e8">x.com</text>
    <rect x="262" y="140" width="130" height="30" rx="15" fill="#e8f0fe"/>
    <text x="276" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a73e8">instagram.com</text>
    <rect x="28" y="178" width="128" height="30" rx="15" fill="#e8f0fe"/>
    <text x="42" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a73e8">youtube.com</text>
    <rect x="163" y="178" width="110" height="30" rx="15" fill="#e8f0fe"/>
    <text x="177" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#1a73e8">reddit.com</text>

    <rect x="28" y="226" width="290" height="34" rx="8" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <text x="42" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#bbb">example.com</text>
    <rect x="326" y="226" width="66" height="34" rx="8" fill="#2196F3"/>
    <text x="346" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="white">Add</text>

    <!-- Tab bar -->
    <line x1="0" y1="544" x2="420" y2="544" stroke="#e0e0e0" stroke-width="1"/>
    <text x="24" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">🛡️</text>
    <rect x="16" y="586" width="38" height="3" rx="1.5" fill="#2196F3"/>
    <text x="94" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">⏱️</text>
    <text x="164" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📅</text>
    <text x="234" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📁</text>
    <text x="304" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📊</text>
    <text x="374" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">⚙️</text>
  </g>

  <!-- Right: Dark mode popup -->
  <g transform="translate(780, 100)" filter="url(#shadow)">
    <rect width="420" height="600" rx="16" fill="#1e1e1e"/>

    <text x="28" y="46" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" fill="#e0e0e0">Focus Blocker</text>

    <rect x="28" y="64" width="58" height="30" rx="15" fill="#64b5f6"/>
    <circle cx="73" cy="79" r="11" fill="white"/>
    <text x="98" y="85" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#64b5f6">Focus Mode: ON</text>

    <text x="28" y="125" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" fill="#a0a0a0" letter-spacing="1.5">BLOCKED WEBSITES</text>

    <rect x="28" y="140" width="135" height="30" rx="15" fill="#263238"/>
    <text x="42" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90caf9">facebook.com</text>
    <rect x="170" y="140" width="85" height="30" rx="15" fill="#263238"/>
    <text x="184" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90caf9">x.com</text>
    <rect x="262" y="140" width="130" height="30" rx="15" fill="#263238"/>
    <text x="276" y="160" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90caf9">instagram.com</text>
    <rect x="28" y="178" width="128" height="30" rx="15" fill="#263238"/>
    <text x="42" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90caf9">youtube.com</text>
    <rect x="163" y="178" width="110" height="30" rx="15" fill="#263238"/>
    <text x="177" y="198" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#90caf9">reddit.com</text>

    <rect x="28" y="226" width="290" height="34" rx="8" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="1"/>
    <text x="42" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#666">example.com</text>
    <rect x="326" y="226" width="66" height="34" rx="8" fill="#64b5f6"/>
    <text x="346" y="248" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" fill="white">Add</text>

    <!-- Tab bar -->
    <line x1="0" y1="544" x2="420" y2="544" stroke="#3a3a3a" stroke-width="1"/>
    <text x="24" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">🛡️</text>
    <rect x="16" y="586" width="38" height="3" rx="1.5" fill="#64b5f6"/>
    <text x="94" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">⏱️</text>
    <text x="164" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📅</text>
    <text x="234" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📁</text>
    <text x="304" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">📊</text>
    <text x="374" y="578" font-family="Arial, Helvetica, sans-serif" font-size="18">⚙️</text>
  </g>
</svg>
