<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00695C"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="800" fill="url(#bg)"/>
  <circle cx="1280" cy="800" r="450" fill="white" opacity="0.04"/>
  <circle cx="0" cy="0" r="300" fill="white" opacity="0.04"/>

  <!-- Left: Marketing copy (Turkish) -->
  <text x="80" y="240" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" fill="white">Dahili Pomodoro</text>
  <text x="80" y="310" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" fill="white">Zamanlayıcı</text>
  <text x="80" y="370" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="white" opacity="0.85">Otomatik molalı odak oturumları</text>

  <rect x="80" y="420" width="6" height="6" rx="3" fill="#80CBC4"/>
  <text x="100" y="428" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="white" opacity="0.9">25 dakika odak oturumları</text>
  <rect x="80" y="458" width="6" height="6" rx="3" fill="#80CBC4"/>
  <text x="100" y="466" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="white" opacity="0.9">Kısa &amp; uzun mola aralıkları</text>
  <rect x="80" y="496" width="6" height="6" rx="3" fill="#80CBC4"/>
  <text x="100" y="504" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="white" opacity="0.9">İlerleme noktalarıyla oturum takibi</text>
  <rect x="80" y="534" width="6" height="6" rx="3" fill="#80CBC4"/>
  <text x="100" y="542" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="white" opacity="0.9">Masaüstü bildirimleri</text>

  <!-- Right: Timer mockup -->
  <g transform="translate(640, 60)" filter="url(#shadow)">
    <rect width="460" height="660" rx="16" fill="white"/>

    <text x="30" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#1a1a1a">Odak Engelleyici</text>

    <circle cx="230" cy="260" r="130" fill="none" stroke="#e0e0e0" stroke-width="10"/>
    <circle cx="230" cy="260" r="130" fill="none" stroke="#00897B" stroke-width="10"
            stroke-dasharray="817" stroke-dashoffset="204" stroke-linecap="round"
            transform="rotate(-90 230 260)"/>

    <text x="230" y="250" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="bold" fill="#1a1a1a" text-anchor="middle">18:32</text>
    <text x="230" y="290" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#00897B" text-anchor="middle" font-weight="500">Odak</text>

    <circle cx="185" cy="330" r="8" fill="#00897B"/>
    <circle cx="210" cy="330" r="8" fill="#e0e0e0"/>
    <circle cx="235" cy="330" r="8" fill="#e0e0e0"/>
    <circle cx="260" cy="330" r="8" fill="#e0e0e0"/>

    <text x="230" y="370" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#888" text-anchor="middle">Çalışıyor...</text>

    <rect x="60" y="410" width="160" height="44" rx="8" fill="#e0e0e0"/>
    <text x="140" y="438" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="#666" text-anchor="middle">Atla</text>
    <rect x="240" y="410" width="160" height="44" rx="8" fill="#ef5350"/>
    <text x="320" y="438" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="500" fill="white" text-anchor="middle">Sıfırla</text>

    <line x1="0" y1="600" x2="460" y2="600" stroke="#e0e0e0" stroke-width="1"/>
    <text x="28" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">🛡️</text>
    <text x="105" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">⏱️</text>
    <rect x="95" y="644" width="44" height="3" rx="1.5" fill="#00897B"/>
    <text x="182" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">📅</text>
    <text x="259" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">📁</text>
    <text x="336" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">📊</text>
    <text x="413" y="636" font-family="Arial, Helvetica, sans-serif" font-size="20">⚙️</text>
  </g>
</svg>
